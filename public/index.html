<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#dc2626" />
    <script>
      (function () {
        var storageKey = 'bloodlife-theme';
        var savedTheme = localStorage.getItem(storageKey);
        var theme =
          savedTheme === 'light' || savedTheme === 'dark'
            ? savedTheme
            : window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';

        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.style.colorScheme = theme;
      })();
    </script>

    <meta
      name="description"
      content="Blood Donation Portal - Connect donors with those in need. Search blood availability, register as donor, and request blood units."
    />

    <!-- Favicon -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E❤️%3C/text%3E%3C/svg%3E"
    />

    <title>BloodLife - Blood Donation Portal</title>

    <!-- Google Maps Places API (REQUIRED for location autocomplete) -->
    <!-- NOTE: Restrict this API key in Google Cloud Console -->
    <script
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD0TG2mStl1WzUrShJY_8ZVFl6ngVbVR38&libraries=places"
      defer
    ></script>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
